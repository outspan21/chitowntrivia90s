function resetCultureTimer(){ clearInterval(state.cultureTimer); const max=getClockMax(); state.cultureTime=max; if(max>0){ state.cultureTimer=setInterval(()=>{ if(state.screen!=="sportschannel"||state.cultureAnswer)return; state.cultureTime--; if(state.cultureTime>0&&state.cultureTime<=3&&lastTickSecond!==state.cultureTime){lastTickSecond=state.cultureTime;playTick()} if(state.cultureTime<=0){ clearInterval(state.cultureTimer); const q=state.cultureFinals[state.cultureIndex]; state.cultureAnswer="__TIMEOUT__"; state.cultureResult="Shot clock violation. The SportsChannel Trophy slips away."; playTimeout(); } render(); },1000); }
} function startSportsChannelRound(){ const finals=[pick(SPORTSCHANNEL_FINALS.easy),pick(SPORTSCHANNEL_FINALS.medium),pick(SPORTSCHANNEL_FINALS.hard)].map(q=>({...q,choices:shuffle(q.choices)})); state.cultureFinals=finals;state.cultureIndex=0;state.cultureCorrect=0;state.cultureAnswer=null;state.cultureResult="";playSportsChannelFinal();state.screen="sportschannel";resetCultureTimer();render();
}
function cultureAnswer(choice){
 if(state.cultureAnswer)return;
 clearInterval(state.cultureTimer);
 const q=state.cultureFinals[state.cultureIndex];
 const picked=(typeof choice==="number"?q.choices[choice]:choice);
 const ok=picked===q.answer;
 state.cultureAnswer=picked;
 state.cultureResult=ok?"Correct. The SportsChannel Final Round booth approves.":"Incorrect. The SportsChannel Trophy slips away.";
 if(ok){state.cultureCorrect++;playCorrect()}else{playWrong()}
 render();
}
function nextCulture(){ if(state.cultureIndex>=2){clearInterval(state.cultureTimer);state.screen=state.cultureCorrect===3?"victory":"results";render();return} state.cultureIndex++;state.cultureAnswer=null;state.cultureResult="";resetCultureTimer();render();
} function continueSummary(){if(state.score===state.deck.length){startSportsChannelRound()}else{state.screen="results";render()}}
function sportschannelAnswer(c){state.sportschannelAnswer=c; const ok=c===state.sportschannel.answer; state.sportschannelResult=ok?"SPORTSCHANNEL TROPHY WON.":"SO CLOSE. SPORTSCHANNEL TROPHY DENIED."; if(ok)playTrophyWin(); else playWrong(); render()}
function toggleAudio(){ unlockAudio(); state.sound=!state.sound; setSoundEnabled(state.sound); if(!state.sound){stopAmbient()} else {refreshAmbientForScreen()} render(); } function feedbackKey(q){ return q && (q.id || `${q.team}_${q.year}_${q.question}`);
}
function getFeedbackStore(){ try{return JSON.parse(localStorage.getItem("sportsTriviaFeedback")||"{}")}catch(e){return{}}
}
function saveFeedbackStore(store){ localStorage.setItem("sportsTriviaFeedback",JSON.stringify(store));
}
function rateQuestion(kind){ const q=state.screen==="sportschannel"?state.cultureFinals[state.cultureIndex]:state.deck[state.i]; if(!q)return; const key=feedbackKey(q); const store=getFeedbackStore(); store[key]={ rating:kind, team:q.team||"culture", year:q.year||"SportsChannel Final Round", difficulty:q.difficulty||(["easy","medium","hard"][state.cultureIndex]||"culture"), question:q.question, answer:q.answer, screen:state.screen, timestamp:new Date().toISOString() }; saveFeedbackStore(store); render();
}
function currentFeedback(){ const q=state.screen==="sportschannel"?state.cultureFinals[state.cultureIndex]:state.deck[state.i]; if(!q)return null; return getFeedbackStore()[feedbackKey(q)]||null;
}
function feedbackControls(){ const fb=currentFeedback(); return `<div class="feedbackBar"><button class="feedbackBtn ${fb&&fb.rating==="up"?"activeUp":""}" onclick="rateQuestion('up')">👍 Good</button><button class="feedbackBtn ${fb&&fb.rating==="down"?"activeDown":""}" onclick="rateQuestion('down')">👎 Replace</button></div><div class="feedbackNote">${fb?`Feedback saved: ${fb.rating==="up"?"Good":"Replace"}`:"Tap feedback during testing"}</div>`;
}
function exportFeedback(){ const store=getFeedbackStore(); const rows=Object.values(store); if(!rows.length){alert("No feedback captured yet.");return} const data=JSON.stringify(rows,null,2); const blob=new Blob([data],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="90s_chicago_sports_question_feedback.json"; a.click(); URL.revokeObjectURL(url);
}
function clearFeedback(){ if(confirm("Clear all saved question feedback on this device?")){ localStorage.removeItem("sportsTriviaFeedback"); render(); }
}

function cleanGeneratedQuestionText(s){
 return String(s||"")
  .replace(/^\s*test\s*[-–—:]+\s*/i,"")
  .replace(/\btest\s*[-–—:]+\s*/ig,"")
  .replace(/\s{2,}/g," ")
  .trim();
}

eedback</button><button class="smallBtn" onclick="clearFeedback()">🧹 Clear Feedback</button><small>Thumb ratings are saved only in this browser/device until exported.</small></div></div>`; return} if(state.screen==="game"){const q=state.deck[state.i], team=TEAMS.find(t=>t.key===q.team), max=state.clock==="tips"?10:state.clock==="ladies"?20:state.clock==="puttputt"?30:0, roundQ=(state.i%5)+1, round=Math.floor(state.i/5)+1, progress=((state.i+1)/state.deck.length)*100, timerDanger=max&&state.time<=(max===10?3:5), roundStart=Math.floor(state.i/5)*5, rqs=state.deck.slice(roundStart,roundStart+5), rscore=rqs.filter(x=>state.correct.has(x.id)).length; app.innerHTML=`<div class="mobileGameHud"><div class="mobileHudBox"><div class="mobileHudLabel">Year</div><div class="mobileHudYear">${q.roundYear}</div></div><div class="mobileHudBox"><div class="mobileHudLabel">${state.timeoutActive ? "Timeout" : (max ? "Shot Clock" : "Clock")}</div><div class="mobileHudClock ${timerDanger?"danger":""}">${state.timeoutActive ? state.timeoutLeft : (max ? state.time : "∞")}</div></div></div><div class="topline compactTop"><div class="teamBlock"><div class="teamVibe">${team.vibe}</div><div class="teamName">${team.emoji} ${team.name}</div></div><div class="toplineRight"><div class="compactStatus"><span>Q ${state.i+1}/${state.deck.length}</span><span class="hot">🔥 ${state.streak}</span><span class="bad">Misses ${state.misses}</span><button class="giveUpBtn" onclick="restartToHome()">I Give Up</button></div></div></div><div class="progress"><div class="bar" style="width:${progress}%"></div></div> <div class="card"><div class="lifelineBar"><button class="lifeBtn" onclick="useFiftyFifty()" ${(state.lifelines.fifty<=0||state.lifelineUsedThisQuestion||state.selected)?"disabled":""}>50/50 (${state.lifelines.fifty})</button><button class="lifeBtn" onclick="useThirtyTimeout()" ${(state.lifelines.timeout<=0||state.lifelineUsedThisQuestion||state.selected||state.clock==="mulligan")?"disabled":""}>Timeout iv style="display:flex;align-items:center;gap:12px"><div class="dots">${Array.from({length:r.total}).map((_,i)=>`<span class="dot ${i<r.correct?"good":""}"></span>`).join("")}</div><b>${r.correct}/${r.total}</b></div></div>`).join("")}<div class="card center"><div class="howTitle">Total Score</div><div style="font-size:40px;font-weight:950">${finalDisplayScore()}</div><div class="sub">${state.score===state.deck.length?"Perfect run. The SportsChannel Final Round awaits.":"No perfect run today. The SportsChannel Trophy remains locked away."}</div></div><button class="btn" onclick="continueSummary()">${state.score===state.deck.length?"Proceed to SportsChannel Final Round":"View Final Results"}</button></div>`;return} if(state.screen==="sportschannel"){ const q=state.cultureFinals[state.cultureIndex], labels=["Easy","Medium","Hard"], max=getClockMax(); app.innerHTML=`<div class="scHud"><div class="scRoundCard"><div class="howTitle">No lifelines. No help. Just 1990s Chicago.</div><h1 style="font-size:34px;margin:4px 0">📺 The SportsChannel Final Round™</h1><div class="sub">Question ${state.cultureIndex+1} of 3 • ${labels[state.cultureIndex]}</div></div><div class="scTimerCard ${max&&state.cultureTime<=3&&!state.cultureAnswer?"danger":""}"><div class="hudLabel">${max?"Shot Clock":"Clock"}</div><div class="scTimerNum">${max?state.cultureTime:"No Clock"}</div><div class="scNoLife">No lifelines</div></div></div><div class="card"><div class="question">${q.question}</div>${feedbackControls()}<div class="choiceGrid">${q.choices.map((c,ci)=>{let cls="choice"; if(state.cultureAnswer){if(c===q.answer)cls+=" correct"; else if(c===state.cultureAnswer)cls+=" wrong"; else cls+=" dim"} return`<button class="${cls}" onclick="cultureAnswer(${ci})">${c}</button>`}).join("")}</div>${state.cultureAnswer?`<div class="modalOverlay"><div class="modalCard"><div class="modalKicker">SportsChannel Final Round</div><div class="modalTitle">${state.cultureResult}</div><div class="modalBody">${explain(q)}</div><button class="btn" onclick="nextCulture()">${state.cultureIndex===2?"Final Verdict":"Next SportsChannel Question"}</button></div></div>`:""}</div>`;return} if(state.screen==="sportschannel"){const q=state.sportschannel; app.innerHTML=`<div class="card center"><div class="howTitle">Final Challenge</div><h1 style="font-size:38px">🏆 SportsChannel Trophy Final 🏆</h1><div class="sub">One final test stands between you and glory.</div></div><div class="card"><div class="question">${q.question}</div><div class="choiceGrid">${q.choices.map(c=>{let cls="choice"; if(state.sportschannelAnswer){if(c===q.answer)cls+=" correct"; else if(c===state.sportschannelAnswer)cls+=" wrong"; else cls+=" dim"} return`<button class="${cls}" onclick="sportschannelAnswer('${String(c).replace(/'/g,"\\'")}')">${c}</button>`}).join("")}</div>${state.sportschannelAnswer?`<div class="feedback"><b>${state.sportschannelResult}</b><div class="sub">${explain(q)}</div><button class="btn" onclick="state.screen=state.sportschannelAnswer===state.sportschannel.answer?'victory':'results';render()">Continue</button></div>`:""}</div>`;return} if(state.screen==="results"||state.screen==="victory"){app.innerHTML=`<div class="card center"><h1 style="font-size:40px">${state.screen==="victory"?"SPORTSCHANNEL TROPHY WON":"Final Score"}</h1><div class="sub">${state.screen==="victory"?"PERFECT SEASON. PERFECT SPORTSCHANNEL FINAL ROUND. Chicago sports immortality has been achieved.":"Good run. But the SportsChannel Trophy demands perfection."}</div>${state.screen==="victory"?`<div class="chicagoSkylineScene">
 <div class="skyFirework one"></div><div class="skyFirework two"></div>
 <div class="skyConfetti">${["🎉","🏆","📺","🍕","⚾","🏀","🏒","🏈"].map((e,i)=>`<span style="left:${8+i*12}%;animation-delay:${(i*.21).toFixed(2)}s">${e}</span>`).join("")}</div>
 <div class="skyline">
